	<body>
		<header>
			<div class="lang-switch">
				<button id="lang-toggle" type="button" aria-label="Mudar idioma">PT</button>
			</div>
			<main>
				<h1 class="intro" data-pt="Olá, eu sou Christian!" data-en="Hello, I'm Christian!">Olá, eu sou Christian!</h1>
				<p class="tagline" data-pt="Desenvolvedor Full Stack" data-en="Full Stack Developer">Desenvolvedor Full Stack</p>

				<div class="actions">
					<a class="btn-primary" data-pt="Ver currículo" data-en="View resume" href="http://christianmlima.github.io/resume/" target="_blank" rel="noopener noreferrer">Ver currículo</a>
				</div>

				<nav class="icons-social" aria-label="Redes sociais">
					<a target="_blank" rel="noopener noreferrer" aria-label="Currículo" data-aria-pt="Currículo" data-aria-en="Resume" href="http://christianmlima.github.io/resume/"><i class="fas fa-file"></i></a>
					<a target="_blank" rel="noopener noreferrer" aria-label="GitHub" data-aria-pt="GitHub" data-aria-en="GitHub" href="https://github.com/christianmlima"><i class="fab fa-github"></i></a>
					<a target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" data-aria-pt="LinkedIn" data-aria-en="LinkedIn" href="https://www.linkedin.com/in/christian-lima-451147124/"><i class="fab fa-linkedin"></i></a>
					<a target="_blank" rel="noopener noreferrer" aria-label="Enviar email" data-aria-pt="Enviar email" data-aria-en="Send email" href="mailto:christianmellolima@outlook.com"><i class="fas fa-envelope"></i></a>
				</nav>
			</main>
		</header>

		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Person",
			"name": "Christian Lima",
			"url": "https://christianmlima.github.io/",
			"jobTitle": "Full Stack Developer"
		}
		</script>

		<script>
		(function(){
			const supported = ['pt','en'];
			const storageKey = 'preferredLang';

			function getBrowserLang(){
				const nav = navigator.languages && navigator.languages.length ? navigator.languages[0] : (navigator.language || navigator.userLanguage || 'pt');
				const code = (nav || 'pt').slice(0,2).toLowerCase();
				return supported.includes(code) ? code : 'en';
			}

			function applyLang(lang){
				document.documentElement.lang = (lang === 'pt') ? 'pt-BR' : 'en';
				// text replacements
				document.querySelectorAll('[data-pt]').forEach(el => {
					const key = (lang === 'pt') ? 'pt' : 'en';
					if (el.dataset && el.dataset[key]) el.textContent = el.dataset[key];
				});
				// aria replacements
				document.querySelectorAll('[data-aria-pt]').forEach(el => {
					const ariaKey = (lang === 'pt') ? el.dataset.ariaPt : el.dataset.ariaEn;
					if (ariaKey) el.setAttribute('aria-label', ariaKey);
				});
				// update toggle label
				const btn = document.getElementById('lang-toggle');
				if (btn) btn.textContent = lang.toUpperCase();
			}

			function init(){
				const saved = localStorage.getItem(storageKey);
				const lang = saved || getBrowserLang();
				applyLang(lang);

				const btn = document.getElementById('lang-toggle');
				if (!btn) return;
				btn.addEventListener('click', () => {
					const current = document.documentElement.lang.startsWith('pt') ? 'pt' : 'en';
					const next = current === 'pt' ? 'en' : 'pt';
					localStorage.setItem(storageKey, next);
					applyLang(next);
				});
			}

			if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
		})();
		</script>
	</body>
</html>
